<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>論理表現Ⅰ 熟語クイズ 完全体</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#FFF6FB;
    margin:0;
}

h1{
    background:#FFD6EC;
    padding:15px;
    margin:0;
}

.screen{
    margin-top:30px;
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:15px;
    background:#CDE7FF;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#B5DBFF;
}

.choice{
    display:block;
    width:65%;
    margin:10px auto;
    background:#D5FFD9;
}

select{
    padding:8px;
    border-radius:10px;
    border:none;
    background:#E6D6FF;
    font-size:15px;
}

#timer{
    font-size:20px;
    margin:15px;
    color:#FF6B9A;
}

#question{
    font-size:20px;
    margin:20px;
}

#feedback{
    margin-top:15px;
    font-size:14px;
    height:25px;
}

.correct{
    color:#3CB371;
}

.wrong{
    color:#FF4D6D;
}

.reviewItem{
    margin:10px;
    font-size:14px;
}
</style>
</head>

<body>

<h1>論理表現Ⅰ 熟語クイズ</h1>

<!-- モード選択 -->
<div id="modeScreen" class="screen">
    <h2>翻訳形式を選んでください</h2>
    <button onclick="setMode('JE')">日本語 → 英語</button>
    <button onclick="setMode('EJ')">英語 → 日本語</button>
</div>

<!-- セクション＋問題数 -->
<div id="configScreen" class="screen" style="display:none;">
    <h2>出題設定</h2>
    <button onclick="startQuiz('sec1')">セクション1（関係詞）</button>
    <button onclick="startQuiz('sec2')">セクション2（仮定法）</button>
    <button onclick="startQuiz('all')">🔀 全問ランダム混合</button>
    <br><br>
    問題数：
    <select id="questionCount">
        <option value="5">5問</option>
        <option value="10">10問</option>
        <option value="all">全問</option>
    </select>
</div>

<!-- クイズ画面 -->
<div id="quizScreen" class="screen" style="display:none;">
    <div id="timer">残り10秒</div>
    <div id="question"></div>
    <div id="choices"></div>
    <div id="feedback"></div>
</div>

<!-- 結果画面 -->
<div id="resultScreen" class="screen" style="display:none;">
    <h2>結果</h2>
    <p id="score"></p>
    <h3>復習</h3>
    <div id="review"></div>
    <button onclick="location.reload()">もう一度</button>
</div>

<script>

let mode;
let allQuestions=[];
let quizQuestions=[];
let current=0;
let score=0;
let timer;
let timeLeft=10;
let wrongList=[];

function setMode(selected){
    mode=selected;
    document.getElementById("modeScreen").style.display="none";
    document.getElementById("configScreen").style.display="block";
}

function buildQuestions(){

    allQuestions=[

    // セクション1
    {sec:1,en:"I will help <u>whoever</u> needs it.",jp:"たとえ誰であっても"},
    {sec:1,en:"Choose <u>whichever</u> you like.",jp:"たとえどれであっても"},
    {sec:1,en:"Call me <u>whenever</u> you need help.",jp:"たとえいつであっても"},
    {sec:1,en:"Go <u>wherever</u> you want.",jp:"たとえどこであっても"},
    {sec:1,en:"<u>However</u> hard it is, try.",jp:"たとえどれくらい〜であっても"},

    // セクション2
    {sec:2,en:"He talks as if he <u>were</u> rich.",jp:"まるで〜であるかのように"},
    {sec:2,en:"She looked as if she <u>had seen</u> a ghost.",jp:"まるで〜であったかのように"},
    {sec:2,en:"<u>Should</u> you need help, call me.",jp:"ifの省略（倒置）"},
    {sec:2,en:"If he were to win, I would be happy.",jp:"仮に〜するとしたら"},
    {sec:2,en:"<u>Without</u> your help, I couldn't succeed.",jp:"〜がなければ"},
    {sec:2,en:"<u>But for</u> your advice, I would have failed.",jp:"〜がなければ"},
    {sec:2,en:"It is <u>high time</u> you went home.",jp:"〜する時間だ"}
    ];
}

function startQuiz(type){

    buildQuestions();
    document.getElementById("configScreen").style.display="none";
    document.getElementById("quizScreen").style.display="block";

    if(type==="sec1"){
        quizQuestions=allQuestions.filter(q=>q.sec===1);
    }
    else if(type==="sec2"){
        quizQuestions=allQuestions.filter(q=>q.sec===2);
    }
    else{
        quizQuestions=[...allQuestions];
    }

    shuffle(quizQuestions);

    let count=document.getElementById("questionCount").value;
    if(count!=="all"){
        quizQuestions=quizQuestions.slice(0,parseInt(count));
    }

    showQuestion();
}

function showQuestion(){

    if(current>=quizQuestions.length){
        endQuiz();
        return;
    }

    timeLeft=10;
    document.getElementById("feedback").textContent="";
    document.getElementById("timer").textContent="残り10秒";

    let q=quizQuestions[current];
    document.getElementById("question").innerHTML=q.en;

    let correct = (mode==="EJ") ? q.jp : q.en.replace(/<[^>]*>/g,"");

    let choices=[correct];

    let pool = (mode==="EJ")
        ? allQuestions.map(x=>x.jp)
        : allQuestions.map(x=>x.en.replace(/<[^>]*>/g,""));

    pool = [...new Set(pool)];
    pool = pool.filter(x=>x!==correct);

    shuffle(pool);

    while(choices.length<4 && pool.length>0){
        let candidate=pool.pop();

        // without / but for 同時排除
        if(correct.includes("Without") && candidate.includes("But for")) continue;
        if(correct.includes("But for") && candidate.includes("Without")) continue;

        choices.push(candidate);
    }

    shuffle(choices);

    let div=document.getElementById("choices");
    div.innerHTML="";

    choices.forEach(c=>{
        let btn=document.createElement("button");
        btn.textContent=c;
        btn.className="choice";
        btn.onclick=()=>selectAnswer(c,correct);
        div.appendChild(btn);
    });

    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").textContent="残り"+timeLeft+"秒";
        if(timeLeft===0){
            clearInterval(timer);
            showFeedback(false,correct,true);
        }
    },1000);
}

function selectAnswer(answer,correct){
    clearInterval(timer);
    let isCorrect = answer===correct;
    showFeedback(isCorrect,correct,false);
}

function showFeedback(isCorrect,correct,isTimeout){

    let fb=document.getElementById("feedback");

    if(isCorrect){
        score++;
        fb.innerHTML="<span class='correct'>正解！</span>";
    }else{
        fb.innerHTML="<span class='wrong'>正解は： "+correct+"</span>";
        wrongList.push({
            question:quizQuestions[current].en,
            answer:correct
        });
    }

    setTimeout(()=>{
        current++;
        showQuestion();
    },1500);
}

function endQuiz(){
    document.getElementById("quizScreen").style.display="none";
    document.getElementById("resultScreen").style.display="block";

    document.getElementById("score").textContent=
        score+" / "+quizQuestions.length+" 問正解！";

    let review=document.getElementById("review");
    review.innerHTML="";

    if(wrongList.length===0){
        review.innerHTML="全問正解！素晴らしい！✨";
    }else{
        wrongList.forEach(item=>{
            review.innerHTML+=
            "<div class='reviewItem'>"+
            item.question+"<br>→ "+item.answer+
            "</div>";
        });
    }
}

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

</script>
</body>
</html>
